name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: PHP ${{ matrix.php }} – Tests & Lint
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ "7.4", "8.1", "8.3" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP ${{ matrix.php }} einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openssl, mbstring, json
          coverage: none

      - name: Composer-Abhängigkeiten installieren
        run: composer update --no-interaction --prefer-dist

      - name: Code-Style prüfen (PHPCS)
        run: vendor/bin/phpcs

      - name: Unit-Tests ausführen (PHPUnit)
        run: vendor/bin/phpunit
